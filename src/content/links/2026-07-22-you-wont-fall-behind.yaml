title: "You won't fall behind"
url: https://www.youtube.com/watch?v=0F5zG1RQ4Ig
description: >-
  ThePrimeagen argues that AI-driven FOMO — the fear that not "token maxing"
  today means falling permanently behind — is structurally similar to past
  hype cycles (React server components, early ChatGPT 3.5) where the specific
  skills people rushed to learn turned out not to matter a year later. He
  shares his own history of anxiety-driven overwork while starting a company,
  and reads from George Hotz's "I love LLMs, I hate hype" on companies
  profiting from users' fear of being left behind.
type: video
tags: [ai, llms, hype, burnout, programmer-health, fomo]
