title: How Taco Bell Built a $15.6 Billion Empire on 8 Ingredients
url: https://www.youtube.com/watch?v=IxGxAX_Gs4o
description: Michael Girdley traces Taco Bell's rise from a single 1962 stand to a $15.6 billion franchise empire, showing how an eight-ingredient menu and a cook-nothing-in-store assembly model (K-Minus) produced margins that beat McDonald's and a late-night "fourth meal" window no competitor has cracked.
