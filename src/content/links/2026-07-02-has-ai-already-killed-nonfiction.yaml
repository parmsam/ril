title: Has AI Already Killed How-To Nonfiction?
url: https://tim.blog/2026/06/12/has-ai-already-killed-nonfiction/
description: >-
  Tim Ferriss shares his own book sales data showing a roughly 80% collapse
  in print copies sold between 2022 and 2026 — a drop that tracks almost
  perfectly with LLM adoption. He argues prescriptive nonfiction is the canary
  in the coal mine for AI disruption of information-based businesses, and that
  the only durable moats left are voice, taste, and transformation — not
  information transfer.
type: post
tags: [ai, publishing, books, nonfiction, llms]
date: 2026-06-12
added: 2026-07-02
note: >-
  I recently asked library staff at my local library if they have seen lending
  similarly go down, and they indicated they have not yet seen a noticeable
  difference, which might indicate that libraries are not yet being impacted.
  Maybe because of the lack of cost associated with lending compared to
  purchasing books.
