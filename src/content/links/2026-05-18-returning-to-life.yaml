description: Hadley Wickham relaunches his Substack to write about AI — a genuinely conflicted take that acknowledges both the excitement (programming accessibility, wide and shallow expertise) and the harms (copyright theft, wealth concentration, intellectual laziness) without collapsing into a take.
type: post
tags: [ai, r, design, data-science, tidyverse]
