title: "I love LLMs, I hate hype"
url: https://geohot.github.io/blog/jekyll/update/2026/07/12/i-love-llms.html
description: >-
  Argues AI progress is real and driven by Moore's law and general computing
  progress, not by frontier labs, whose anti-open-source arguments are read as
  fear of commodification rather than safety concerns. Pushes back on
  "singularity" hype as a distraction, while affirming coding agents give a
  genuine, if overstated, productivity boost.
