title: "$16 Million, Dead Ducks, and Algae: The Reflecting Pool Explained by a Scientist"
url: https://www.youtube.com/watch?v=7PrT4p8SMAU
description: An environmental lake scientist examines why the Lincoln Memorial Reflecting Pool's $16 million renovation was predictably doomed — the 18-inch-deep, stagnant pool has had algae since 1922, and the 2026 changes (dark blue paint, no-bid contracts, chemical treatment before species ID) made a known chronic problem worse.
type: episode
tags: [environment, water, science, algae, ecology, government]
date: 2026-06-26
added: 2026-06-30
note: >-
  The treatment-before-identification sequence is the sharpest critique: hydrogen peroxide applied before species confirmation can lyse cyanobacteria cells, simultaneously spiking toxin concentrations and destroying the morphological evidence needed to identify what was in the water — leaving both the duck deaths and the public health question unresolvable.
