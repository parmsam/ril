description: "CBS Sunday Morning's Lesley Stahl tours Consumer Reports' Yonkers labs and Connecticut auto test track, covering how the nonprofit buys every product it tests to avoid conflicts of interest, its role pushing automakers toward standard crash-avoidance systems, and its investigation linking the Fisher-Price Rock 'n Play sleeper to infant deaths that led to a recall of nearly 5 million units."
