title: Stochastic parrot
url: https://en.wikipedia.org/wiki/Stochastic_parrot
description: "Wikipedia overview of the \"stochastic parrot\" metaphor, coined in a 2021 AI ethics paper by Timnit Gebru, Emily M. Bender, and colleagues, which frames large language models as systems that statistically mimic text without genuine understanding. Covers the Gebru–Google firing controversy and the ongoing debate between skeptics and researchers like Geoffrey Hinton who argue understanding emerges from prediction at scale."
