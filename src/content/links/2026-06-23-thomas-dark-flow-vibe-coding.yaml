title: "Breaking the Spell of Vibe Coding"
url: https://www.fast.ai/posts/2026-01-28-dark-flow/
description: Rachel Thomas draws a sharp parallel between vibe coding and gambling addiction, coining "dark flow" to describe how AI coding agents produce the feel of productive focus without real growth. A METR study found developers perceived a 20% speedup while actually working 19% slower — a nearly 40% gap between felt and actual productivity.
type: article
tags: [ai, vibe-coding, agents, deskilling, flow]
