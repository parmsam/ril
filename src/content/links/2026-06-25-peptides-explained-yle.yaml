description: Epidemiologist Katelyn Jetelina breaks down BPC-157, TB-500, and the peptide boom — what the science actually shows (mostly animal studies), the regulatory whiplash after RFK Jr.'s Rogan appearance, and why people skeptical of vaccines embrace compounds with even less human evidence.
