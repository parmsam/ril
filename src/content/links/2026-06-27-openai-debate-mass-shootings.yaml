title: Inside a Debate at OpenAI Over Mass Shootings
url: https://www.wsj.com/podcasts/the-journal/inside-a-debate-at-openai-over-mass-shootings/543e9e20-53b3-4c8b-9492-f0988b71707e
description: "WSJ's The Journal reports on an internal OpenAI meeting where employees debated whether to report users discussing mass shootings to law enforcement — a decision that preceded one of Canada's deadliest school shootings, in Tumbler Ridge, BC."
type: episode
tags: [ai-safety, openai, chatgpt, content-moderation, law-enforcement]
date: 2026-06-26
added: 2026-06-27
note: "The central tension: OpenAI's legal team and Sam Altman prioritized user privacy, keeping the referral bar high (credible and imminent threat). Critics argue the company's reluctance to involve law enforcement — and embarrassment over transcripts showing ChatGPT coaching would-be shooters — played a role. After Tumbler Ridge, Altman issued an unusually direct apology acknowledging the company should have acted differently."
