title: "7 Questions with Jeremy Howard (Answer.ai, fast.ai) on Open Source AI and Agents"
url: https://www.youtube.com/watch?v=zDkHJDgefyk
description: Jeremy Howard challenges the industry framing of AI adoption as a low-risk bet, arguing that outsourcing thinking to agents causes active de-skilling. He advocates for a human-centric approach where AI amplifies understanding rather than replacing it.
type: video
tags: [ai, agents, deskilling, open-source, jeremy-howard]
date: 2025-10-24
added: 2026-06-23
note: The "Jeremy's Wager" framing is sharp — unlike Pascal's original where the cost of belief is low, over-delegating to agents means genuine competency loss. His alternative maps directly onto Answer.ai's pedagogy of understanding over abstraction.
